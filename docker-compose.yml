version: "3.9"

services:
  zkali_mcp:
    build: .
    container_name: zkali_mcp
    ports:
      - "8000:8000"
    volumes:
      - zkali_data:/data
    environment:
      MCP_DB_PATH: /data/zkali.db
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  zkali_data:
    driver: local
